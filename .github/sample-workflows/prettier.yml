name: prettier

on: ["push", "pull_request"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Yarn dependencies
        run: npm install -g yarn && yarn

      - name: Execute tests
        run: ./node_modules/.bin/prettier resources --check
