name: prettier

on: ['push', 'pull_request']

jobs:
    prettier:
        runs-on: ubuntu-latest

        name: Prettier

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   uses: actions/setup-node@v4
                with:
                    node-version: lts/*

            -   name: Install Yarn dependencies
                run: npm install -g yarn && yarn

            -   name: Execute tests
                run: ./node_modules/.bin/prettier resources --check
